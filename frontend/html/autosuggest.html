<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BeingInfinity</title>
    <style>
        /* ==========================================
   1. RESET & BASE STYLES
   ========================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            /* Makes width/height calculations predictable */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #ffffff;
            color: #333333;
            min-height: 100vh;
            /* Forces the body to take up the full screen height */

            /* Layout */
            display: flex;
            flex-direction: column;
        }

        /* ==========================================
   2. TOP NAVIGATION BAR LAYOUT
   ========================================== */
        .top-bar {
            display: flex;
            justify-content: space-between;
            /* Pushes items to far left and far right */
            align-items: center;
            /* Vertically centers elements inside the bar */
            padding: 20px 30px;
            /* Adds breathing room around the edges */
        }

        /* ==========================================
   3. MAIN CONTENT LAYOUT (FIXED RE-ANCHOR)
   ========================================== */
        .search-container {
            display: flex;
            flex-direction: column;
            /* Stacks elements vertically */
            align-items: center;
            /* Horizontally centers the elements */

            flex-grow: 1;
            /* Takes up the remaining vertical screen space */
            padding: 0 20px;
        }

        /* ==========================================
   4. TYPOGRAPHY & LOGO STYLING (FIXED POSITION)
   ========================================== */
        .logo {
            font-size: 5rem;
            font-weight: 500;
            letter-spacing: -2px;
            margin-top: 12vh;
            /* Locks logo height relative to the viewport top */
            margin-bottom: 24px;
        }

        .blue-text {
            color: #4a90e2;
            /* Clean, vibrant blue color */
        }

        .black-text {
            color: #1a1a1a;
            /* Deep off-black color */
        }

        .tagline {
            font-size: 1.15rem;
            color: #888888;
            /* Soft gray text */
            margin-bottom: 35px;
            /* Pushes the search box down */
            text-align: center;
        }

        /* ==========================================
   5. SEARCH BOX CAPSULE DESIGN
   ========================================== */
        .search-box {
            display: flex;
            align-items: center;
            width: 100%;
            max-width: 780px;
            /* Keeps the search bar from expanding infinitely */
            border: 1px solid #e2e2e2;
            /* Soft, subtle gray border */
            border-radius: 50px;
            /* Massive radius to create the "pill" shape */
            padding: 14px 24px;
            /* Inner space so text isn't cramped against the edges */
            background-color: #ffffff;
        }

        /* Subtly highlights the search bar wrapper when the input is clicked */
        .search-box:focus-within {
            border-color: #b5b5b5;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.04);
        }

        .search-icon {
            font-size: 1.2rem;
            color: #b5b5b5;
            /* Matches the gray of the icon in the image */
            margin-right: 14px;
            /* Gap between magnifier icon and input text */
        }

        .search-box input {
            border: none;
            /* Removes browser default text-box border */
            outline: none;
            /* Removes default blue focus outline */
            width: 100%;
            font-size: 1.15rem;
            color: #333333;
        }

        .search-box input::placeholder {
            color: #888888;
            /* Placeholder color exactly matching the image */
        }

        /* ==========================================
   6. UI CONTROLS (SETTINGS & STATUS BAR)
   ========================================== */
        .settings-btn {
            background: none;
            border: none;
            font-size: 1.8rem;
            color: #888888;
            cursor: pointer;
            transition: transform 0.3s ease;
        }

        .settings-btn:hover {
            transform: rotate(30deg);
            /* Smooth mini-rotation dynamic detail */
        }

        .status-indicator {
            display: flex;
            align-items: center;
            border: 1px solid #e2e2e2;
            border-radius: 20px;
            /* Smaller capsule container */
            padding: 8px 18px;
            font-size: 0.9rem;
            color: #666666;
        }

        .dot {
            width: 6px;
            height: 6px;
            background-color: #333333;
            /* Small dark gray status dot */
            border-radius: 50%;
            /* Turns a perfect square into a clean circle */
            margin-right: 8px;
            /* Distance from the dot to the word "online" */
        }

        /* ==========================================
   7. AUTO-SUGGEST DROPDOWN STYLING
   ========================================== */
        .results-dropdown {
            width: 100%;
            max-width: 780px;
            /* Matches the width of our search bar */
            margin-top: 10px;
            /* Slight gap below the search input capsule */
            border-radius: 16px;
            background-color: #ffffff;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.06);
            /* Soft focus drop shadow */
            max-height: 300px;
            /* Prevents container from stretching too far */
            overflow-y: auto;
            /* Lets users scroll inside if there are many matches */
            border: 1px solid #e2e2e2;
        }

        /* Hide empty dropdown borders when nothing is being queried */
        .results-dropdown:empty {
            border: none;
            box-shadow: none;
        }

        .result-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 24px;
            border-bottom: 1px solid #f5f5f5;
            cursor: pointer;
            font-size: 1rem;
            color: #333333;
        }

        .result-item:last-child {
            border-bottom: none;
            /* Cleans up the round bottom edge border */
        }

        .result-item:hover {
            background-color: #f9f9f9;
            /* Hover row highlight feedback link */
        }

        .weight-badge {
            font-size: 0.85rem;
            background-color: #f0f0f0;
            color: #666666;
            padding: 3px 8px;
            border-radius: 6px;
            font-family: monospace;
            /* Clean uniform look for decimal numbers */
        }

        .no-match {
            color: #999999;
            font-style: italic;
            justify-content: center;
        }

        /* ==========================================
   8. KEYBOARD NAVIGATION HIGHLIGHT
   ========================================== */
        .result-item.active {
            background-color: #f0f4f9;
            /* Light blue tint indicating selection */
            outline: none;
        }
    </style>
</head>

<body>

    <div class="top-bar">
        <!-- https://www.toptal.com/designers/htmlarrows/symbols/ -->
        <button class="settings-btn" aria-label="Settings">&#9881;</button>
        <!-- <button class="settings-btn" aria-label="Settings">&#x2699;</button> -->
        <div class="status-indicator">
            <span class="dot"></span> online | ⏱ — ms
        </div>
    </div>

    <main class="search-container">
        <h1 class="logo">
            <span class="blue-text">Being</span><span class="black-text">Infinity</span>
        </h1>

        <p class="tagline">One million phrases. Four algorithms. Prefix Based Auto Suggest.</p>

        <div class="search-box">
            <span class="search-icon">&#128269;</span>
            <input type="text" placeholder="Start typing to search phrases..." autocomplete="off">
        </div>
    </main>

    <script>
        // ==========================================
        // 1. GENERATE DATASET (26 letters * 10 phrases = 260 items)
        // ==========================================
        const alphabet = 'abcdefghijklmnopqrstuvwxyz';
        const mockTemplates = [
            "is an incredible journey",
            "builds modern applications",
            "creates clean user interfaces",
            "demonstrates high performance code",
            "explores infinity and beyond",
            "focuses on minimalist design",
            "generates scalable web solutions",
            "helps developers learn step by step",
            "integrates algorithms seamlessly",
            "just works out of the box"
        ];

        const phraseDataset = [];

        // Populate the dataset programmatically so we have 260 clean objects
        for (let char of alphabet) {
            for (let i = 0; i < 10; i++) {
                // Create an uppercase first letter phrase (e.g., "Apple is an incredible journey")
                const baseWord = char.toUpperCase() + (char === 'x' ? 'ylophone' : char === 'q' ? 'ueue' : 'omething');
                const phrase = `${baseWord} ${mockTemplates[i]}`;

                // Random weight between 0.00 and 1.00 fixed to 2 decimal places
                const weight = parseFloat(Math.random().toFixed(2));

                phraseDataset.push({ phrase, weight });
            }
        }

        // ==========================================
        // 2. DOM ELEMENT SELECTORS
        // ==========================================
        const searchInput = document.querySelector('.search-box input');
        const statusText = document.querySelector('.status-indicator');

        // Create a container dynamically under the search bar to show our results
        const searchContainer = document.querySelector('.search-container');
        const resultsDropdown = document.createElement('div');
        resultsDropdown.className = 'results-dropdown';
        searchContainer.appendChild(resultsDropdown);


        // ==========================================
        // 3. PREFIX FILTER ALGORITHM
        // ==========================================
        function getSuggestions(query) {
            const startTime = performance.now(); // Start precision timer

            // Normalize user typing to lowercase for matching
            const cleanQuery = query.toLowerCase().trim();

            // If input is empty, clear results box and exit
            if (cleanQuery === "") {
                resultsDropdown.innerHTML = "";
                statusText.innerHTML = `<span class="dot"></span> online | ⏱ — ms`;
                return;
            }

            // Filter array: check if phrase starts with the user's typed string
            const filteredResults = phraseDataset.filter(item =>
                item.phrase.toLowerCase().startsWith(cleanQuery)
            );

            // Sort results by weight descending (highest weight first)
            filteredResults.sort((a, b) => b.weight - a.weight);

            const endTime = performance.now(); // End precision timer
            const executionTime = (endTime - startTime).toFixed(2); // Keep decimal points for microsecond accuracy

            // Render findings to screen
            renderResults(filteredResults);

            // Update top right status with actual matching execution speed
            statusText.innerHTML = `<span class="dot"></span> online | ⏱ ${executionTime} ms`;
        }


        // ==========================================
        // 4. RENDERING TO THE UI
        // ==========================================
        function renderResults(results) {
            resultsDropdown.innerHTML = ""; // Clear out past entries

            if (results.length === 0) {
                resultsDropdown.innerHTML = `<div class="result-item no-match">No phrases match your query</div>`;
                return;
            }

            // Build the matching elements
            results.forEach(item => {
                const div = document.createElement('div');
                div.className = 'result-item';
                div.innerHTML = `
            <span class="phrase-text">${item.phrase}</span>
            <span class="weight-badge">${item.weight}</span>
        `;
                resultsDropdown.appendChild(div);
            });
        }


        // ==========================================
        // 5. EVENT LISTENERS
        // ==========================================
        searchInput.addEventListener('input', (e) => {
            getSuggestions(e.target.value);
        });


        // ==========================================
        // 6. KEYBOARD NAVIGATION & EVENT LISTENERS
        // ==========================================
        let currentFocus = -1; // -1 means no item is currently highlighted

        searchInput.addEventListener('input', (e) => {
            currentFocus = -1; // Reset highlight position whenever the user types a new character
            getSuggestions(e.target.value);
        });

        // Intercept keydown events on the input field
        searchInput.addEventListener('keydown', (e) => {
            // Grab all the currently rendered result elements
            const items = resultsDropdown.querySelectorAll('.result-item:not(.no-match)');

            if (items.length === 0) return; // If no results are showing, ignore keyboard events

            if (e.key === "ArrowDown") {
                e.preventDefault(); // Prevents the text cursor from jumping to the end of the input box
                currentFocus++;
                addActive(items);
            }
            else if (e.key === "ArrowUp") {
                e.preventDefault(); // Prevents the text cursor from jumping to the beginning of the input box
                currentFocus--;
                addActive(items);
            }
            else if (e.key === "Enter") {
                e.preventDefault(); // Prevents forms from accidentally submitting

                // If the user has highlighted a specific row, select it
                if (currentFocus > -1 && items[currentFocus]) {
                    selectItem(items[currentFocus]);
                }
            }
        });

        // Helper function to manage adding/removing the visual '.active' class
        function addActive(items) {
            if (!items) return false;

            // Clear out any old active classes first
            removeActive(items);

            // Circular loop logic:
            // If we go past the bottom item, loop back to the top item
            if (currentFocus >= items.length) currentFocus = 0;
            // If we press up past the top item, loop back to the bottom item
            if (currentFocus < 0) currentFocus = items.length - 1;

            // Add the active styling class to the focused item
            items[currentFocus].classList.add("active");

            // Smoothly scroll the dropdown container if the highlighted item goes out of view
            items[currentFocus].scrollIntoView({
                behavior: "smooth",
                block: "nearest"
            });
        }

        function removeActive(items) {
            for (let i = 0; i < items.length; i++) {
                items[i].classList.remove("active");
            }
        }

        // Handles selecting a phrase, filling the search box, and hiding the dropdown
        function selectItem(itemElement) {
            // Grab the exact phrase string inside this element
            const fullPhrase = itemElement.querySelector('.phrase-text').textContent;

            // Fill our search input box with it
            searchInput.value = fullPhrase;

            // Hide the dropdown by clearing its content
            resultsDropdown.innerHTML = "";

            // Reset our highlight index pointer
            currentFocus = -1;
        }

        // Optional Bonus: Allow clicking on a row with the mouse to select it too!
        resultsDropdown.addEventListener('click', (e) => {
            const clickedItem = e.target.closest('.result-item:not(.no-match)');
            if (clickedItem) {
                selectItem(clickedItem);
            }
        });
    </script>
</body>

</html>
