      This page contains operations on user cards.
    </p>

      You can view, toggle, get random users, and much more.

  <div class="user-card">
    <div class="user-image">
      <img src="./static/jane.png" id="user-avatar" alt="Avatar">

    <div class="user-details">
      <h2 id="user-name">Jane Doe</h2>
      <p id="user-gender">Female</p>

    <button onclick="toggleUser()" class="action-button">Toggle</button>
    <button onclick="getRandomUser()" class="action-button">Get Random User</button>
    <button onclick="getRandomUser()" class="action-button">My Random User</button>
  </div>
